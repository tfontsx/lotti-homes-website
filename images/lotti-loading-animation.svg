<svg width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <image id="logoSrc" href="images/mainlogo.png" x="883.56" y="503.17" width="152.88" height="73.66"/>
    <mask id="revealMask" maskUnits="userSpaceOnUse">
      <rect x="873.56" y="473.17" width="0" height="133.66" fill="white">
        <animate attributeName="width" from="0" to="222.88" begin="0.12s" dur="1.3s" calcMode="spline" keySplines="0.22 1 0.36 1" fill="freeze"/>
      </rect>
    </mask>
  </defs>
  <rect id="bg" x="0" y="0" width="1920" height="1080" fill="#020C17">
    <animate attributeName="opacity" from="1" to="0" begin="1.9s" dur="0.6s" calcMode="spline" keySplines="0.5 0 0.35 1" fill="freeze"/>
  </rect>
  <g id="logoWrap">
    <animate attributeName="opacity" from="1" to="0" begin="1.75s" dur="0.3s" calcMode="spline" keySplines="0.4 0 0.6 1" fill="freeze"/>
    <g mask="url(#revealMask)">
      <use href="#logoSrc"/>
    </g>
  </g>
</svg>